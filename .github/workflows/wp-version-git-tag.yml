# Checks WordPress git tag and commits if changed

name: WordPress version

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  schedule:
    # * is a special character in YAML so you have to quote this string.
    # /30 denotes that it will run once every 30 minutes    
    #- cron:  '*/15 * * * *' # every 15 mins
    - cron:  '15 * * * *' # :15 every hour

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "wpv"
  wpv:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.WPV_REPO_TOKEN }}
    # Get WordPress version
    - name: Get WordPress version
      run: |
        MAX_ATTEMPTS=3
        RETRY_DELAY=10
        wpversion=""

        for attempt in $(seq 1 $MAX_ATTEMPTS); do
          raw=$(timeout 30 git ls-remote --tags https://github.com/WordPress/WordPress.git 2>/dev/null \
                | tail -n1 | awk -F'/' '{print $3}')
          if [ -n "$raw" ]; then
            wpversion="$raw"
            break
          fi
          echo "Attempt $attempt/$MAX_ATTEMPTS failed or returned empty. Retrying in ${RETRY_DELAY}s..."
          sleep $RETRY_DELAY
        done

        if [ -z "$wpversion" ]; then
          echo "Could not reach GitHub after $MAX_ATTEMPTS attempts. Skipping (transient error)."
          exit 0
        fi

        if ! echo "$wpversion" | grep -qE '^[0-9]+\.[0-9]+'; then
          echo "Version string '$wpversion' failed validation. Skipping."
          exit 0
        fi

        fileversion=$(cat index.html)
        if [ "$fileversion" = "$wpversion" ]; then
          echo "Already at $wpversion, nothing to do."
          exit 0
        fi

        echo "$wpversion" > index.html
        git config --local user.email "builder@github.example"
        git config --local user.name "GitHub's Little Builder"
        git add .
        git commit -m "$wpversion, checked: $(date +'%F %T %Z')"
        git push origin master
